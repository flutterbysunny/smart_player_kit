name: smart_player_kit
description: Advanced Flutter media player kit with modern controls and streaming support.
version: 0.0.1

environment:
  sdk: ^3.10.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

  plugin_platform_interface: ^2.0.2

  video_player: ^2.10.0
  chewie: ^1.11.3
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.smart_player_kit
        pluginClass: SmartPlayerKitPlugin

      ios:
        pluginClass: SmartPlayerKitPlugin
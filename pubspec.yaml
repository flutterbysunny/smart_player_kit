name: smart_player_kit
description: Advanced Flutter media player kit with modern controls and streaming support.
version: 0.0.1

environment:
  sdk: ^3.10.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

  plugin_platform_interface: ^2.0.2

  # ─── Video Player ──────────────────────────────────────────────────────────
  video_player: ^2.8.6           # Core video playback

  # ─── Audio ─────────────────────────────────────────────────────────────────
  just_audio: ^0.9.40            # Advanced audio (podcast/music)
  audio_session: ^0.1.21         # Background + lock screen handling

  # ─── Storage ───────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2     # Resume position save karo

  # ─── Network ───────────────────────────────────────────────────────────────
  dio: ^5.7.0                    # HTTP downloads + subtitle fetch
  connectivity_plus: ^6.0.5      # Network speed monitor

  # ─── System ────────────────────────────────────────────────────────────────
  wakelock_plus: ^1.2.8          # Screen on rakhna video ke time
  screen_brightness: ^0.2.2+1    # Brightness gesture control
  volume_controller: ^2.0.8      # Volume gesture control

  # ─── Cache ─────────────────────────────────────────────────────────────────
  flutter_cache_manager: ^3.4.1  # Smart video caching

  # ─── Notifications ─────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.smart_player_kit
        pluginClass: SmartPlayerKitPlugin

      ios:
        pluginClass: SmartPlayerKitPlugin
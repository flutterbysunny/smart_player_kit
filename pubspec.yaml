name: smart_player_kit
description: >-
  A feature-rich Flutter media player package with YouTube/Netflix-style controls,
  HLS streaming, subtitles (SRT/WebVTT), audio player, reels/TikTok mode,
  mini player, background playback, resume support, and analytics.
version: 1.0.0
homepage: https://github.com/flutterbysunny/smart_player_kit
repository: https://github.com/flutterbysunny/smart_player_kit
issue_tracker: https://github.com/flutterbysunny/smart_player_kit/issues

# pub.dev topics — search mein dikhne ke liye (max 5)
topics:
  - video
  - audio
  - media-player
  - streaming
  - hls

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── Video Player ───────────────────────────────────────────────────────────
  video_player: ^2.8.6

  # ─── Audio ──────────────────────────────────────────────────────────────────
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # ─── Storage ────────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ─── Network ────────────────────────────────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # ─── System ─────────────────────────────────────────────────────────────────
  wakelock_plus: ^1.2.8
  screen_brightness: ^0.2.2+1
  volume_controller: ^2.0.8

  # ─── Cache ──────────────────────────────────────────────────────────────────
  flutter_cache_manager: ^3.4.1

  # ─── Notifications ──────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.smart_player_kit
        pluginClass: SmartPlayerKitPlugin
      ios:
        pluginClass: SmartPlayerKitPlugin